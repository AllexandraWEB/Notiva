<div class="m-3 h-[calc(100dvh-1.5rem)] bg-white rounded-lg border-neutral-200 border px-8 py-7">
  <!-- Header -->
  <app-shared-notes-header />
  <!-- Notes grid -->
  <div class="grid grid-col-1 xl:grid-cols-4 items-start justify-center gap-4">
    @for (note of notes; track note.id) {
    <app-note-template [note]="note" />
    }
  </div>
</div>
