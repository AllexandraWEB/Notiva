<div class="mb-6">
  <div class="top-header">
    <a
      routerLink="/"
      class="flex items-center gap-0.75 font-medium text-[#888] no-underline transition-colors duration-150 hover:text-[#333] cursor-pointer"
    >
      <ng-icon name="lucideChevronLeft" />
      Home
    </a>
    <span class="text-[#ccc]">/</span>
    <span class="font-medium text-[#333]">All notes</span>
  </div>

  <div class="flex items-center gap-3">
    <!-- Search Bar -->
    <div class="search-header">
      <ng-icon name="radixMagnifyingGlass" />
      <input
        type="text"
        class="w-full border-none bg-transparent text-[0.8125rem] text-[#333] outline-none placeholder:text-[#bbb]"
        placeholder="Search a note"
      />
    </div>
    <!-- Filters -->
    <div class="ml-auto flex items-center gap-2">
      <button class="bg-">
        <ng-icon name="lucideFilter" />
      </button>
      <div
        class="flex overflow-hidden rounded-lg border border-[#e8e8e8] bg-white"
      >
        <button
          class="flex h-8 w-8 cursor-pointer items-center justify-center border-none bg-[#f0f0f0] text-[#333] transition-[background,color] duration-150 hover:bg-[#f5f5f5]"
          title="Grid view"
        >
          <ng-icon name="lucideLayoutGrid" />
        </button>
        <button class="listview-button" title="List view">
          <ng-icon name="lucideList" />
        </button>
      </div>
    </div>
  </div>
</div>
