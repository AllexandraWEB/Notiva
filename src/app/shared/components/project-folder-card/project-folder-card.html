<section class="relative group flex flex-col items-center justify-center w-full h-full mt-6">
  <button
    type="button"
    class="file relative w-60 h-40 cursor-pointer origin-bottom perspective-[1500px] z-50"
    (click)="onOpen()"
  >
    <div
      class="work-5 w-full h-full origin-top rounded-2xl rounded-tl-none bg-zinc-700 border border-zinc-800 group-hover:shadow-[0_20px_40px_rgba(0,0,0,.2)] transition-all ease duration-300 relative after:absolute after:content-[''] after:bottom-[99%] after:left-0 after:w-20 after:h-4 after:bg-zinc-700 after:rounded-t-2xl before:absolute before:content-[''] before:-top-3.75 before:left-[75.5px] before:w-4 before:h-4 before:bg-zinc-700 before:[clip-path:polygon(0_35%,0%_100%,50%_100%);]"
    ></div>
    <div class="work-4 absolute inset-1 bg-zinc-400 rounded-2xl transition-all ease duration-300 origin-bottom select-none group-hover:transform-[rotateX(-20deg)]"></div>
    <div class="work-3 absolute inset-1 bg-zinc-300 rounded-2xl transition-all ease duration-300 origin-bottom group-hover:transform-[rotateX(-30deg)]"></div>
    <div class="work-2 absolute inset-1 bg-zinc-200 rounded-2xl transition-all ease duration-300 origin-bottom group-hover:transform-[rotateX(-38deg)]"></div>
    <div
      class="work-1 absolute bottom-0 w-full h-39 rounded-2xl rounded-tr-none bg-zinc-700 border border-zinc-800 after:absolute after:content-[''] after:bottom-[99%] after:right-0 after:w-36.5 after:h-4 after:bg-zinc-700 after:rounded-t-2xl before:absolute before:content-[''] before:-top-2.5 before:right-35.5 before:size-3 before:bg-zinc-700 before:[clip-path:polygon(100%_14%,50%_100%,100%_100%);] transition-all ease duration-300 origin-bottom flex items-end group-hover:transform-[rotateX(-46deg)_translateY(1px)]"
    >
      <div class="mb-2 ml-2 flex items-center gap-1.5">
        <span class="h-4 w-4 rounded-full bg-white/90 border border-black/10"></span>
        <span class="h-4 w-4 rounded-full bg-white/90 border border-black/10"></span>
        <span class="h-4 w-4 rounded-full bg-white/90 border border-black/10"></span>
      </div>
    </div>
  </button>

  <h3 class="mt-5 text-3xl font-semibold text-neutral-900 truncate max-w-full px-2">{{ title }}</h3>
  <p class="pt-1 text-xl text-neutral-600">{{ fileCount }} Files</p>
</section>
