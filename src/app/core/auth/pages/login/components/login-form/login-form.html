<section class="flex flex-col w-[55%] px-16 py-10 bg-white max-lg:w-full max-lg:px-7 max-lg:py-8">

  <!-- Logo -->
  <div class="flex items-center gap-2 text-[1.125rem] font-semibold tracking-[-0.02em] text-[#0f0f0f]">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Notiva</span>
  </div>

  <!-- Form body -->
  <div class="flex-1 flex flex-col justify-center max-w-[22rem] mx-auto my-12 w-full">

    <div class="mb-7">
      <h1 class="text-[1.625rem] font-bold tracking-[-0.03em] text-[#0f0f0f] m-0 mb-1.5">Welcome back</h1>
      <p class="text-sm text-gray-500 m-0">Sign in to continue to your notes.</p>
    </div>

    <!-- Error banner -->
    <div *ngIf="authStore.error()" class="text-[0.8125rem] rounded-lg px-3.5 py-2.5 mb-4 bg-red-50 text-red-800 border border-red-200">
      {{ authStore.error() }}
    </div>

    <!-- Google OAuth -->
    <button
      type="button"
      class="flex items-center justify-center gap-2.5 w-full py-[0.6875rem] px-4 border border-[#e4e4e7] rounded-[0.625rem] bg-white text-sm font-medium text-[#18181b] cursor-pointer transition-colors hover:bg-gray-50 hover:border-gray-300 disabled:opacity-60 disabled:cursor-not-allowed"
      (click)="onGoogleSignIn()"
      [disabled]="authStore.loading()"
    >
      <svg class="w-[1.125rem] h-[1.125rem] shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-[#e4e4e7]"></div>
      <span class="text-xs text-gray-400 px-1">or</span>
      <div class="flex-1 h-px bg-[#e4e4e7]"></div>
    </div>

    <!-- Credentials form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- Email -->
      <div class="flex flex-col mb-4">
        <label for="email" class="text-[0.8125rem] font-medium text-gray-700 mb-1.5">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
          class="w-full py-[0.6875rem] px-3.5 text-sm text-[#0f0f0f] bg-white border border-[#e4e4e7] rounded-[0.625rem] outline-none transition focus:border-[#a1a1aa] focus:shadow-[0_0_0_3px_rgba(0,0,0,0.05)] box-border"
          [class.auth-input--error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
          class="text-xs text-red-500 mt-1"
        >
          Please enter a valid email.
        </span>
      </div>

      <!-- Password -->
      <div class="flex flex-col mb-4">
        <div class="mb-1.5">
          <label for="password" class="text-[0.8125rem] font-medium text-gray-700">Password</label>
        </div>
        <div class="relative">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="w-full py-[0.6875rem] px-3.5 pr-11 text-sm text-[#0f0f0f] bg-white border border-[#e4e4e7] rounded-[0.625rem] outline-none transition focus:border-[#a1a1aa] focus:shadow-[0_0_0_3px_rgba(0,0,0,0.05)] box-border"
            [class.auth-input--error]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <button
            type="button"
            class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-0 p-0 cursor-pointer text-gray-400 hover:text-gray-700 flex items-center"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="!showPassword()" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword()" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span
          *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
          class="text-xs text-red-500 mt-1"
        >
          Password must be at least 6 characters.
        </span>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="flex items-center justify-center w-full py-[0.7rem] px-4 mt-2 bg-[#0f0f0f] text-white text-sm font-medium border-0 rounded-[0.625rem] cursor-pointer transition-colors hover:bg-[#27272a] disabled:opacity-60 disabled:cursor-not-allowed min-h-[2.625rem]"
        [disabled]="authStore.loading()"
      >
        <span *ngIf="!authStore.loading()">Sign in</span>
        <span *ngIf="authStore.loading()" class="inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
      </button>
    </form>

    <p class="mt-6 text-center text-[0.8125rem] text-gray-500">
      Don't have an account?
      <a routerLink="/auth/register" class="text-[#0f0f0f] font-medium no-underline hover:underline">Create one</a>
    </p>
  </div>
</section>
